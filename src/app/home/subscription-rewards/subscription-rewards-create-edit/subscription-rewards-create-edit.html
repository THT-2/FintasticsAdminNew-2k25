<div class="row">
  <div class="col-sm-12">

    <app-card
      [cardTitle]="rewardsFormControl['_id'].value ? GlobalConstant['EDIT'] + ' Rewards' : GlobalConstant['ADD'] + ' Rewards'"
      blockClass="pc-component"
      route_button="">

      <section class="container-xxl">
        <div class="form-card p-3 p-md-4">
          <form [formGroup]="rewardsForm" (ngSubmit)="submit()" class="needs-validation" novalidate>
            <div class="row g-3">


                            <!-- Type -->
<div class="col-md-6">
  <label class="form-label">Plan Type <span class="req">*</span></label>
  <div class="input-group">
    <span class="input-group-text"><i class="bi bi-award"></i></span>
    <select class="form-select" formControlName="type">
      <option value="" disabled selected>Select Type</option>
      <option *ngFor="let item of subscriptionTypes" [value]="item">{{ item }}</option>
    </select>
  </div>
  <div *ngIf="rewardsForm.get('type')?.touched && rewardsForm.get('type')?.invalid" class="text-danger">
    Type is required.
  </div>
</div>

              <!-- Title -->
              <div class="col-md-6">
                <label class="form-label">Title <span class="req">*</span></label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-bank"></i></span>
                  <input type="text" class="form-control" formControlName="title" placeholder="Title" />
                </div>
                <div *ngIf="rewardsForm.get('title')?.touched && rewardsForm.get('title')?.invalid" class="text-danger">
                  Title is required.
                </div>
              </div>

            

                <!-- Title -->
              <div class="col-md-6">
                <label class="form-label">Name <span class="req">*</span></label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-bank"></i></span>
                  <input type="text" class="form-control" formControlName="title" placeholder="Title" />
                </div>
                <div *ngIf="rewardsForm.get('title')?.touched && rewardsForm.get('title')?.invalid" class="text-danger">
                  Name is required.
                </div>
              </div>
                <!-- Icon -->
              <div class="col-md-6">
                <label class="form-label">Icon
                  <!-- <span class="req">*</span> -->
                </label>
                <app-file-upload (getFilePath)="onFilePathReceived($event)"></app-file-upload>
                @if(rewardsFormControl['icon'].value) {
                  <!-- <div class="mt-2">
                    <app-file-preview [filePath]="BankFormControl['icon'].value"></app-file-preview>
                  </div> -->
                   <!-- <div *ngIf="BankFormControl['icon'].value" class="mt-3"> -->
                    <div class="position-relative d-inline-block">
                      <img width="100px" [src]="rewardsFormControl['icon'].value" />
                      <span class="badge bg-danger position-absolute top-0 end-0" style="cursor:pointer" (click)="removeImages('icon')">X</span>
                    </div>
                  <!-- </div> -->
                }
                <!-- <div *ngIf="rewardsForm.get('icon')?.touched && rewardsForm.get('icon')?.invalid" class="text-danger">
                  Icon is required.
                </div> -->
              </div>


              <div class="col-md-6">
              <label class="form-label">Amount <span class="req">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-ticket-perforated"></i></span>
                <input type="text" class="form-control" formControlName="offerAmount" placeholder="Offer Amount" />
              </div>
              <div *ngIf="rewardsForm.get('offerAmount')?.touched && rewardsForm.get('offerAmount')?.invalid" class="text-danger">
               Amount is required (Only Numbers).
              </div>
            </div>

              <!-- Description -->
                <div class="col-6">
                  <label class="form-label">Description</label>
                  <textarea class="form-control" formControlName="description" placeholder="Description..."></textarea>
                </div>

            </div>

            <!-- Submit -->
            <div class="d-flex justify-content-end gap-2 mt-4">
              <button type="submit" [disabled]="btnLoader" class="btn btn-cta btn-cta-wide">
                @if(btnLoader) {
                  <div class="spinner-border text-white" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                } @else {
                  {{rewardsFormControl['_id'].value ? 'Update' : 'Submit'}}
                }
              </button>
            </div>

          </form>
        </div>
      </section>

    </app-card>
  </div>
</div>
