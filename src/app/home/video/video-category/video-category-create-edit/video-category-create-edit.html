<main class="main-content" id="mainContent" >
  
    <section class="container-xxl">
        <h5 class="section-title">
  {{ isEditMode 
      ? GlobalConstant['EDIT'] + ' Category' 
      : GlobalConstant['ADD'] + ' Category' }}
</h5>
      <!-- <h5 class="section-title">
        {{ videoFormControl['_id'].value ? GlobalConstant['EDIT'] + ' Category' : GlobalConstant['ADD'] + ' Category' }}
      </h5> -->
      <div class="form-card p-3 p-md-4">
        <form [formGroup]="videoForm" (ngSubmit)="submit()" class="needs-validation" novalidate>
          <div class="row g-3">

            <!-- Category Name -->
            <div >
              <label class="form-label">Category Name <span class="req">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-tags"></i></span>
                <input type="text" class="form-control" placeholder="Category Name" formControlName="categoryname" />
              </div>
              <div *ngIf="videoForm.get('categoryname')?.touched && videoForm.get('categoryname')?.invalid" class="text-danger">
                Category Name is required.
              </div>
            </div>

            <!-- Icon Upload -->
            <div >
              <label class="form-label">Icon </label>
              <app-file-upload (getFilePath)="onFilePathReceived($event)"></app-file-upload>
              <div *ngIf="videoFormControl['icon'].value" class="mt-2">
                <app-file-preview [filePath]="videoFormControl['icon'].value"></app-file-preview>
              </div>
              <!-- <div *ngIf="videoForm.get('icon')?.touched && videoForm.get('icon')?.invalid" class="text-danger">
                Icon is required.
              </div> -->
            </div>

            <!-- Submit Button -->
            <div class="col-12 pt-2 d-flex justify-content-end">
              <button type="submit" [disabled] ="btnLoader" class="btn btn-cta btn-cta-wide">
                <ng-container *ngIf="btnLoader; else btnText">
                  <div class="spinner-border text-white" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                </ng-container>
                <ng-template #btnText>
                  {{ videoFormControl['_id'].value ? 'Update' : 'Submit' }}
                </ng-template>
              </button>
            </div>
          </div>
        </form>
      </div>
    </section>
  
</main>
